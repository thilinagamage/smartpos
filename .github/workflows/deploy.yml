name: Build and Deploy SmartPOS


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: smartpos_test
          POSTGRES_USER: smartpos
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5


    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, gd, zip, bcmath, mbstring


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'


      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist


      - name: Install Node dependencies and build assets
        run: npm ci && npm run build


      - name: Copy .env for testing
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=smartpos/DB_DATABASE=smartpos_test/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=smartpos/' .env
          sed -i "s/DB_PASSWORD=/DB_PASSWORD=secret/" .env


      - name: Generate app key
        run: php artisan key:generate


      - name: Run migrations
        run: php artisan migrate --force


      - name: Run tests
        run: php artisan test


  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'


    steps:
      - uses: actions/checkout@v4


      - name: Setup Node.js and build assets
        uses: actions/setup-node@v4
        with:
          node-version: '22'


      - run: npm ci && npm run build


      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'


    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/smartpos
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo 'Deployment complete'
