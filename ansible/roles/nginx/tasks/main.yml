---
- name: Install Nginx and Certbot
  apt:
    name: [nginx, certbot, python3-certbot-nginx]
    update_cache: yes


- name: Deploy Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/smartpos


- name: Enable site
  file:
    src: /etc/nginx/sites-available/smartpos
    dest: /etc/nginx/sites-enabled/smartpos
    state: link


- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent


- name: Reload Nginx
  systemd:
    name: nginx
    state: reloaded
    enabled: yes
